{% extends "base.html" %}
{% block title %}{{ 'تحصيل من عميل' if type == 'receipt' else 'سداد لمورد' }}{% endblock %}
{% block content %}
<div class="topbar">
    <h2>{{ 'تحصيل من عميل' if type == 'receipt' else 'سداد لمورد' }}</h2>
    <a href="{{ url_for('payments.index') }}" class="btn secondary">رجوع</a>
</div>

<form method="POST" action="{{ url_for('payments.create') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <input type="hidden" name="type" value="{{ type }}">
    <div class="card" style="max-width:500px;">
        <div class="field">
            <label>{{ 'العميل' if type == 'receipt' else 'المورد' }}</label>
            <select name="contact_id" required>
                <option value="">-- اختر --</option>
                {% for c in contacts %}
                <option value="{{ c.id }}">{{ c.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field">
            <label>المبلغ</label>
            <input type="number" name="amount" step="0.01" min="0.01" required>
        </div>
        <div class="field">
            <label>التاريخ</label>
            <input type="date" name="payment_date" required>
        </div>
        <div class="field">
            <label>حساب الخزينة/البنك</label>
            <select name="cash_account_id" required>
                {% for a in cash_accounts %}
                <option value="{{ a.id }}">{{ a.code }} - {{ a.name }}</option>
                {% endfor %}
            </select>
        </div>
        <div class="field">
            <label>طريقة الدفع</label>
            <select name="method">
                <option value="cash">نقدي</option>
                <option value="bank">تحويل بنكي</option>
                <option value="check">شيك</option>
            </select>
        </div>
        <div class="field">
            <label>ملاحظات</label>
            <textarea name="notes" rows="2"></textarea>
        </div>
        <button type="submit" class="btn">حفظ</button>
    </div>
</form>
{% endblock %}
