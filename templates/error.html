<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>خطأ {{ code }}</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div style="min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--paper);">
    <div class="card" style="max-width:420px; text-align:center; padding:48px 36px;">
        <div style="font-family:'Markazi Text', serif; font-size:56px; color:var(--primary); font-weight:700;">{{ code }}</div>
        <p style="color:var(--ink-soft); margin:12px 0 24px;">{{ message }}</p>
        <a href="/" class="btn">رجوع للوحة التحكم</a>
    </div>
</div>
</body>
</html>
